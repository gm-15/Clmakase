stages:
  - test
  - build
  - scan
  - update-manifest
  - deploy-secrets
  - deploy-frontend
  - load-test

variables:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 160884802838.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: oliveyoung-api
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  S3_BUCKET: cloudwave-assets-dev
  CLOUDFRONT_ID: "E155J7FXWTRRXA"
  API_URL: "https://api.clmakase.click"

test:
  stage: test
  image: gradle:8.5-jdk17
  script:
    - cd backend
    - gradle test --no-daemon
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/*.xml
    paths:
      - backend/build/reports/tests/
    expire_in: 7 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - cd backend
    - docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
    - docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

trivy-scan:
  stage: scan
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache aws-cli curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - trivy image --exit-code 1 --severity CRITICAL --format json --output trivy-report.json $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG || true
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 30 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

update-manifest:
  stage: update-manifest
  image: alpine:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "gitlab-ci@clmakase.click"
    - git config --global user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
  script:
    - git fetch origin main
    - git checkout main
    - 'sed -i "s|image:.*oliveyoung-api:.*|image: 160884802838.dkr.ecr.ap-northeast-2.amazonaws.com/oliveyoung-api:${IMAGE_TAG}|" k8s/deployment.yaml'
    - git add k8s/deployment.yaml
    - git diff --cached --quiet && echo "No changes" && exit 0
    - 'git commit -m "ci: update image tag to ${IMAGE_TAG} [skip ci]"'
    - git push origin main
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

deploy-secrets:
  stage: deploy-secrets
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  before_script:
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x ./kubectl
    - mv ./kubectl /usr/local/bin/kubectl
    - aws eks update-kubeconfig --region $AWS_REGION --name cloudwave-eks
  script:
    - |
      if [ -z "$DATADOG_API_KEY" ] || [ -z "$DATADOG_APP_KEY" ]; then
        echo "❌ DATADOG_API_KEY 또는 DATADOG_APP_KEY 가 비어있습니다. GitLab CI/CD Variables를 확인하세요."
        exit 1
      fi
      kubectl create secret generic datadog-keda-secret \
        --namespace oliveyoung \
        --from-literal=apiKey="$DATADOG_API_KEY" \
        --from-literal=appKey="$DATADOG_APP_KEY" \
        --dry-run=client -o yaml | kubectl apply -f -
    - echo "✅ datadog-keda-secret 갱신 완료"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

deploy-frontend:
  stage: deploy-frontend
  image: node:20-alpine
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd frontend
    - npm ci
    - npm run build
    - aws s3 sync dist/ s3://$S3_BUCKET/ --delete --exclude "*.json" --exclude "*.log"
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths "/*"
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"

load-test:
  stage: load-test
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  script:
    - k6 run k6/load-test.js
  variables:
    BASE_URL: $API_URL
  artifacts:
    when: always
    paths:
      - k6-summary.json
    expire_in: 7 days
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

