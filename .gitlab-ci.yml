stages:
  - test
  - build
  - scan
  - deploy-frontend
  - load-test

variables:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 160884802838.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: oliveyoung-api
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  S3_BUCKET: cloudwave-assets-dev
  ALB_URL: "http://k8s-oliveyou-oliveyou-a886c5cbad-1691723051.ap-northeast-2.elb.amazonaws.com"

test:
  stage: test
  image: gradle:8.5-jdk17
  script:
    - cd backend
    - gradle test --no-daemon
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/*.xml
    paths:
      - backend/build/reports/tests/
    expire_in: 7 days
  allow_failure: true
  only:
    - main
    - merge_requests

build:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - cd backend
    - docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
    - docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
  only:
    - main

trivy-scan:
  stage: scan
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache aws-cli curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    - trivy image --exit-code 1 --severity CRITICAL --format json --output trivy-report.json $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG || true
  artifacts:
    when: always
    paths:
      - trivy-report.json
    expire_in: 30 days
  allow_failure: true
  only:
    - main

deploy-frontend:
  stage: deploy-frontend
  image: node:20-alpine
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd frontend
    - npm ci
    - VITE_API_URL=$ALB_URL npm run build
    - aws s3 sync dist/ s3://$S3_BUCKET/ --delete --exclude "*.json" --exclude "*.log"
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 day
  only:
    - main

load-test:
  stage: load-test
  image:
    name: grafana/k6:latest
    entrypoint: [""]
  script:
    - k6 run k6/load-test.js
  variables:
    BASE_URL: "http://k8s-oliveyou-oliveyou-a886c5cbad-1691723051.ap-northeast-2.elb.amazonaws.com"
  artifacts:
    when: always
    paths:
      - k6-summary.json
    expire_in: 7 days
  when: manual
  only:
    - main
