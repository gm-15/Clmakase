################################################################################
# KEDA ScaledObject - oliveyoung-api 통합 오토스케일링
#
# Scaler 구성:
#   1. Kafka   - Consumer Lag 기반 Scale Out/In (queue-entry-requests 토픽)
#              ※ 현재 비활성화: consumer group 미구성으로 인한 cascade 에러 방지
#              ※ Kafka 완전 구성 후 주석 해제하여 재활성화
#   2. Datadog - RPS 기반 Scale Out/In
#   3. Cron    - 세일 시간대 사전 Scale Out (Warm-up)
#
# ※ Redis Scaler 미사용: ElastiCache는 클러스터 외부 엔드포인트로
#   KEDA Redis Scaler 직접 연결 불가 (TLS/AUTH 미설정 환경)
#
# 동작 방식:
#   - 활성화된 트리거 중 가장 높은 값을 기준으로 replicas 결정
#   - KEDA가 내부적으로 HPA를 생성하여 관리
#
# Cron 트리거 수정 방법:
#   - start/end: cron 표현식 (분 시 * * *)
#   - timezone: 타임존 (Asia/Seoul 고정)
#   - desiredReplicas: 세일 시간대 유지할 최소 Pod 수
################################################################################

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: oliveyoung-api-scaledobject
  namespace: oliveyoung
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oliveyoung-api               # deployment.yaml의 name과 일치

  # 스케일링 범위
  minReplicaCount: 2                   # 평시 최소 (장애 주입 시나리오 기준)
  maxReplicaCount: 100                 # 노드 리소스 한도 내 최대 Pod 수 (150,000 VU 부하테스트)

  # 폴링 및 쿨다운
  pollingInterval: 15                  # 15초마다 메트릭 수집
  cooldownPeriod: 120                  # 스케일 인 전 대기시간(초) - 너무 짧으면 thrashing 발생

  # Scale In/Out 속도 제어 (급격한 변동 방지)
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30    # 스케일 아웃: 30초 동안 안정적으로 높으면 실행
          policies:
            - type: Pods
              value: 50                     # 한 번에 최대 50개 Pod 추가 (150,000 VU 급상승 대응)
              periodSeconds: 30
        scaleDown:
          stabilizationWindowSeconds: 180   # 스케일 인: 3분 동안 안정적으로 낮아야 실행
          policies:
            - type: Pods
              value: 2                      # 한 번에 최대 2개 Pod 제거 (급격한 감소 방지)
              periodSeconds: 60

  triggers:

    ############################################################################
    # 1. Kafka Scaler - Consumer Lag 기반 (현재 비활성화)
    #    계산식: ceil(totalLag / lagThreshold) = 필요 Pod 수
    #    예시: lag=300, threshold=50 → ceil(300/50) = 6 Pods
    ############################################################################
    ############################################################################
    # 3. Datadog Scaler - RPS 기반
    #    계산식: ceil(queryResult / queryValue) = 필요 Pod 수
    #    예시: RPS=800, threshold=100 → ceil(800/100) = 8 Pods
    #
    #    deployment.yaml의 DD_SERVICE: "oliveyoung-api" 기준 쿼리
    ############################################################################
    - type: datadog
      authenticationRef:
        name: datadog-trigger-auth   # trigger-auth-datadog.yaml의 name과 일치
      metadata:
        type: global                 # 전체 RPS 합산 기준
        # 최근 60초 평균 RPS 합산 쿼리
        query: "sum:trace.servlet.request.hits{service:oliveyoung-api}.rollup(sum, 60)"
        queryValue: "1600"          # 최근 60초 요청 합산 기준 Pod당 임계값
                                    # 계산: 목표 RPS × 60초 ÷ 목표 Pod 수
                                    # 예) 160 RPS, 6 Pod → 9600 ÷ 6 = 1600
        activationQueryValue: "100" # 100 req/60s (≈1.7 RPS) 미만이면 스케일 비활성화
        age: "180"                  # 최근 180초 데이터 기준 (너무 짧으면 데이터 부족 오류)

    ############################################################################
    # 4. Cron Scaler - 세일 시간대 사전 Pod + 노드 Warm-up
    #
    #    목적:
    #      세일 오픈 전 미리 Pod를 확보하여 Karpenter가 노드를 추가할 시간을 확보
    #      → 세일 오픈 시 콜드 스타트 없이 즉시 트래픽 수용
    #
    #    동작 흐름:
    #      start 시각 → desiredReplicas만큼 Pod 요청
    #               → 노드 부족 시 Karpenter 자동으로 노드 추가 (약 2~3분 소요)
    #               → 세일 오픈 전 노드 + Pod 모두 Ready 상태
    #      end 시각   → cron 트리거 해제, 실제 메트릭 기준(Kafka/Redis/Datadog)으로 복귀
    #               → 트래픽 감소 시 자연스럽게 Scale In
    #
    #    ※ 수정 가이드:
    #       start/end 형식: "MM HH * * *"  (분 시 매일)
    #       예) 오후 11시 50분 시작 → "50 23 * * *"
    #           오전 1시 30분 종료  → "30 01 * * *"
    #
    #    ※ desiredReplicas:
    #       세일 시간대 보장할 최소 Pod 수
    #       이후 Kafka/Redis/Datadog 트리거가 maxReplicaCount(20)까지 추가 확장
    ############################################################################
    - type: cron
      metadata:
        timezone: Asia/Seoul
        start: "50 23 * * *"     # ← 세일 시작 10분 전 (수정 필요)
        end: "30 01 * * *"       # ← 세일 종료 후   (수정 필요)
        desiredReplicas: "20"    # ← 세일 시간대 최소 Pod 수 (30,000 VU 사전 Warm-up)
