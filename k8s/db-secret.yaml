################################################################################
# DB Secret (수동 생성용 템플릿)
# 실제 적용 시: kubectl apply -f db-secret.yaml
# 값은 base64 인코딩 필요: echo -n 'value' | base64
################################################################################
apiVersion: v1
kind: Secret
metadata:
  name: oliveyoung-db-secret
  namespace: oliveyoung
type: Opaque
data:
  DB_USERNAME: <BASE64_ENCODED_USERNAME>
  DB_PASSWORD: <BASE64_ENCODED_PASSWORD>
