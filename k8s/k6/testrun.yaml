################################################################################
# k6 Operator TestRun — 30,000 VU 분산 부하테스트
#
# [분산 구성]
#   parallelism: 5  →  각 runner가 6,000 VU 담당 (6,000 × 5 = 30,000 VU 합계)
#   k6 Operator가 5개 Job을 동시에 실행하고 결과를 집계
#
# [사전 준비]
#   1. k6 Operator 설치:
#      helm repo add grafana https://grafana.github.io/helm-charts
#      helm install k6-operator grafana/k6-operator -n k6-operator --create-namespace
#
#   2. ConfigMap 및 TestRun 적용:
#      kubectl apply -f k8s/k6/   # 둘 다 k6-operator 네임스페이스
#
# [진행 상태 확인]
#   kubectl get testrun -n k6-operator
#   kubectl logs -n k6-operator -l app=k6 --follow
################################################################################

apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: oliveyoung-sale-loadtest
  namespace: k6-operator
spec:
  # 분산 실행: 5개 runner가 각 6,000 VU 담당 → 합계 30,000 VU
  parallelism: 5

  script:
    configMap:
      name: k6-load-test-script   # k6-operator 네임스페이스의 ConfigMap
      file: load-test.js

  arguments: "--env BASE_URL=https://api.clmakase.click"

  runner:
    image: grafana/k6:latest
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
    env:
      - name: BASE_URL
        value: "https://api.clmakase.click"

  # 테스트 완료 후 Job/Pod 자동 정리
  cleanup: "post"
