apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023 # 최신 보안 및 그래비톤 최적화를 위해 추천
  # [핵심] 테라폼에서 넣은 태그로 찾습니다.
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "cloudwave-eks"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "cloudwave-eks"
  role: "cloudwave-eks-karpenter-node-role" # 아까 만든 노드용 IAM 역할 이름