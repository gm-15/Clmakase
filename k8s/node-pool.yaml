apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: security-optimized-pool
spec:
  template:
    spec:
      expireAfter: 720h # 30일마다 노드 교체 (보안 패치 및 신선도 유지)
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          # [주의] CI/CD(GitLab)가 amd64 단일 플랫폼 빌드만 수행하므로
          # arm64 제거 — arm64 노드 스케줄 시 ImagePullBackOff 발생
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          # [안정성] 대규모 트래픽 시 스팟 중단(Interruption)을 방지하기 위해
          # 온디맨드 비중을 높이거나 전략적으로 선택합니다.
          values: ["on-demand", "spot"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          # [보안/성능] 고성능 인스턴스 위주로 구성
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          # [보안] 최신 하드웨어 암호화 기능을 위해 6세대 이상만 사용
          values: ["6"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          # [150,000 VU] Pod당 2CPU/2Gi 기준 → xlarge 이상, 8xlarge까지 허용
          # 8xlarge(32c/64g): Pod 16개 수용 → 대량 파드 빠른 스케줄링
          values: ["xlarge", "2xlarge", "4xlarge", "8xlarge"]
  limits:
    cpu: "800"
    memory: "1600Gi"
  disruption:
    # [가용성] 대규모 트래픽 중 노드가 갑자기 삭제되는 것을 방지
    consolidationPolicy: WhenUnderutilized
    consolidateAfter: 30s
    budgets:
      - nodes: "30%"
      # [안정성] 부하테스트/세일 피크 시간대 노드 교체 금지
      # Kafka 브로커가 올라타 있는 노드가 교체되지 않도록 보호
      - schedule: "50 23 * * *"   # 23:50 ~ 01:30 (세일 시간대)
        duration: 100m             # 1시간 40분 동안 교체 0개
        nodes: "0"
