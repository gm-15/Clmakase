apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: security-optimized-pool
spec:
  template:
    spec:
      expireAfter: 720h # 30일마다 노드 교체 (보안 패치 및 신선도 유지)
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          # [보안/성능] 그래비톤(arm64)을 우선하되,
          # 이미지 호환성 문제로 배포 실패를 방지하기 위해 amd64를 백업으로 유지합니다.
          values: ["arm64", "amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          # [안정성] 대규모 트래픽 시 스팟 중단(Interruption)을 방지하기 위해
          # 온디맨드 비중을 높이거나 전략적으로 선택합니다.
          values: ["on-demand", "spot"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          # [보안/성능] 고성능 인스턴스 위주로 구성
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          # [보안] 최신 하드웨어 암호화 기능(Graviton 3, 4)을 위해 6세대 이상만 사용
          values: ["6"]
  disruption:
    # [가용성] 대규모 트래픽 중 노드가 갑자기 삭제되는 것을 방지
    consolidationPolicy: WhenUnderutilized
    budgets:
      - nodes: "10%"
