apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oliveyoung-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/clmakase-group/Clmakase.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: oliveyoung
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
