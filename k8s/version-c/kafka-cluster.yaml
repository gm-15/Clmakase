################################################################################
# Kafka on EKS - Version C (3-Broker Cluster + Zookeeper)
# 올리브영 대기열: 고가용성 Kafka 클러스터
#
# [Version A와의 차이]
# - Deployment → StatefulSet (안정적 네트워크 ID)
# - 1 Broker → 3 Brokers (kafka-0, kafka-1, kafka-2)
# - replication-factor=3, min.insync.replicas=2
# - PersistentVolumeClaim으로 데이터 영속성 보장
#
# [면접 포인트]
# Q: "왜 Deployment 대신 StatefulSet을 사용했나요?"
# A: Kafka 브로커는 안정적 네트워크 ID가 필요합니다.
#    StatefulSet은 kafka-0, kafka-1, kafka-2처럼 고정 호스트명을 제공하고,
#    PVC도 브로커별로 유지되어 재시작 시 데이터가 보존됩니다.
################################################################################

---
# Zookeeper (Kafka 메타데이터 관리)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: oliveyoung
  labels:
    app: zookeeper
    version: c
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: oliveyoung
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
      targetPort: 2181
  clusterIP: None

---
# Kafka Headless Service (StatefulSet용 DNS)
# kafka-0.kafka-headless.oliveyoung.svc.cluster.local
# kafka-1.kafka-headless.oliveyoung.svc.cluster.local
# kafka-2.kafka-headless.oliveyoung.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: oliveyoung
  labels:
    app: kafka
spec:
  ports:
    - port: 9092
      targetPort: 9092
      name: broker
  clusterIP: None
  selector:
    app: kafka

---
# Kafka Client Service (앱에서 접근용)
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: oliveyoung
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: kafka

---
# Kafka 3-Broker StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: oliveyoung
  labels:
    app: kafka
    version: c
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
              name: broker
          env:
            # 브로커 ID: Pod 이름에서 자동 추출 (kafka-0→0, kafka-1→1, kafka-2→2)
            - name: KAFKA_BROKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper.oliveyoung.svc.cluster.local:2181"
            # 각 브로커의 고유 리스너 주소 (Pod DNS)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://$(POD_NAME).kafka-headless.oliveyoung.svc.cluster.local:9092"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            # 복제 설정 (고가용성 핵심)
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            # 토픽 자동 생성 비활성화 (KafkaClusterConfig에서 명시적 생성)
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "24"
          command:
            - sh
            - -c
            - |
              # Pod 이름에서 브로커 ID 추출 (kafka-0 → 0)
              export KAFKA_BROKER_ID=${HOSTNAME##*-}
              /etc/confluent/docker/run
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2
        resources:
          requests:
            storage: 5Gi
